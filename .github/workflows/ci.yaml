name: CI pipline

on: push 

jobs:
  project-testting:
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code 
      uses: actions/checkout@v4

    - name: setup python 
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: install dependencies 
      run: |
        pip install -r requirements.txt

    - name: run pipeline
      env:
        DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
      run: |
        dvc repro



